version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: projectxpdv_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: pdvproject_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pdv_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pdv.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: